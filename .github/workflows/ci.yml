name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Create test dataset
      run: |
        python -c "import pandas as pd; pd.DataFrame({'text': ['Fire!', 'Peace'], 'target': [1, 0]}).to_csv('data/train.csv', index=False)"

    - name: Train model
      run: |
        python src/train.py

    - name: Run tests
      run: |
        pytest tests/ -v